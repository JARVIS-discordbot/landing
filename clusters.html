<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" href="/favicon.ico" type="image/x-icon">
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Jarvis Bot — Cluster Status</title>
<style>
  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);
    color: #fff;
    margin: 0;
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  h1 { font-size: 3rem; margin-bottom: 10px; text-align: center; text-transform: uppercase; letter-spacing: 2px; }
  h2 { font-size: 1.2rem; color: #a3b3ff; margin-bottom: 30px; }

  /* New System Stats Bar */
  .system-stats-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    width: 100%;
    max-width: 1200px;
    margin-bottom: 40px;
  }

  .stat-box {
    background: rgba(255, 255, 255, 0.05);
    border-radius: 12px;
    padding: 15px 25px;
    border: 1px solid rgba(114, 137, 218, 0.3);
    min-width: 200px;
    text-align: center;
  }

  .stat-label { color: #8892b0; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 5px; }
  .stat-value { font-size: 1.4rem; font-weight: bold; color: #7289da; }

  /* RAM Progress Bar */
  .progress-wrapper { width: 100%; background: #23272a; border-radius: 5px; margin-top: 10px; height: 10px; overflow: hidden; }
  .progress-fill { height: 100%; background: #43b581; width: 0%; transition: width 0.5s ease, background 0.5s ease; }

  .cluster-container {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(280px,1fr));
    gap: 20px;
    width: 100%;
    max-width: 1200px;
  }

  .cluster-card {
    background: rgba(26,26,46,0.95);
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    border-left: 5px solid #7289da;
    transition: transform 0.3s ease;
  }
  .cluster-card.offline { border-left-color: #f04747; opacity: 0.8; }
  .cluster-card:hover { transform: translateY(-5px); }

  .status-badge {
    float: right;
    font-size: 0.7rem;
    padding: 3px 8px;
    border-radius: 10px;
    background: #43b581;
    color: white;
    text-transform: uppercase;
  }
  .status-badge.offline { background: #f04747; }

  footer { margin-top: 60px; font-size: 0.9rem; color: #8892b0; }
</style>
</head>
<body>

<h1>Jarvis Discord Bot</h1>
<h2>Cluster Status Dashboard</h2>

<div class="system-stats-container">
    <div class="stat-box">
        <div class="stat-label">Bot RAM Usage</div>
        <div class="stat-value" id="bot-ram-val">0.00 / 10 GB</div>
        <div class="progress-wrapper"><div id="ram-bar" class="progress-fill"></div></div>
    </div>
    <div class="stat-box">
        <div class="stat-label">Total System CPU</div>
        <div class="stat-value" id="sys-cpu-val">0.0%</div>
    </div>
    <div class="stat-box">
        <div class="stat-label">Bot Uptime</div>
        <div class="stat-value" id="bot-uptime" style="font-size: 1rem; color: #fff;">Loading...</div>
    </div>
</div>

<div class="cluster-container" id="clusters"></div>

<footer>
    &copy; 2026 Jarvis Discord Bot | System Status Nominal
</footer>

<script>
async function loadClusters() {
  try {
    const res = await fetch('/clusters');
    const data = await res.json();

    // 1. Update Global System Stats
    const sys = data.system_stats;
    document.getElementById('sys-cpu-val').innerText = `${sys.cpu_total_percent.toFixed(1)}%`;
    document.getElementById('bot-ram-val').innerText = `${sys.bot_ram_gb.toFixed(2)} / ${sys.bot_ram_limit_gb} GB`;
    document.getElementById('bot-uptime').innerText = data.bot_uptime;

    // Update RAM Progress Bar
    const ramPercent = (sys.bot_ram_gb / sys.bot_ram_limit_gb) * 100;
    const ramBar = document.getElementById('ram-bar');
    ramBar.style.width = `${Math.min(ramPercent, 100)}%`;
    
    // Color logic for RAM bar
    if (ramPercent > 85) ramBar.style.background = '#f04747'; // Red
    else if (ramPercent > 60) ramBar.style.background = '#faa61a'; // Orange
    else ramBar.style.background = '#43b581'; // Green

    // 2. Update Clusters
    const container = document.getElementById('clusters');
    container.innerHTML = '';

    data.clusters.forEach(cluster => {
      const isOnline = cluster.status === "Online";
      const card = document.createElement('div');
      card.className = `cluster-card ${isOnline ? '' : 'offline'}`;
      
      card.innerHTML = `
        <span class="status-badge ${isOnline ? '' : 'offline'}">${cluster.status}</span>
        <h3>${cluster.name} <small style="color:#8892b0; font-size:0.8rem;">(Shard ${cluster.shard_id})</small></h3>
        <p><strong>Servers:</strong> ${cluster.servers.toLocaleString()}</p>
        <p><strong>Users:</strong> ${cluster.users.toLocaleString()}</p>
        <p><strong>Latency:</strong> ${cluster.latency_ms} ms</p>
      `;
      container.appendChild(card);
    });
  } catch (err) {
    document.getElementById('clusters').innerHTML = '<p style="color:#f04747;">Unable to connect to Jarvis API. Retrying...</p>';
    console.error(err);
  }
}

// Initial load and refresh every 10 seconds
loadClusters();
setInterval(loadClusters, 10000);
</script>

</body>
</html>
